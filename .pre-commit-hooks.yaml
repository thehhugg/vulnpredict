- id: vulnpredict-scan
  name: VulnPredict Security Scan
  description: Scan staged files for potential security vulnerabilities
  entry: vulnpredict scan --profile quick --min-severity medium
  language: python
  types_or: [python, javascript, jsx, ts, tsx]
  pass_filenames: false
  always_run: true
  stages: [pre-commit]
  minimum_pre_commit_version: "2.9.0"
