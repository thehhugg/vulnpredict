# ---------------------------------------------------------------------------
# Black — code formatting
# ---------------------------------------------------------------------------
[tool.black]
line-length = 120
target-version = ["py39", "py310", "py311", "py312"]

# ---------------------------------------------------------------------------
# isort — import sorting (black-compatible)
# ---------------------------------------------------------------------------
[tool.isort]
profile = "black"
line_length = 120
known_first_party = ["vulnpredict"]

# ---------------------------------------------------------------------------
# Bandit — security linting
# ---------------------------------------------------------------------------
[tool.bandit]
exclude_dirs = ["tests", "demo_project"]
skips = ["B101", "B110", "B112", "B404", "B603", "B607"]  # B101: assert, B110/B112: resilient error handling, B404/B603/B607: subprocess with known-safe commands

# ---------------------------------------------------------------------------
# pytest — test configuration
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
